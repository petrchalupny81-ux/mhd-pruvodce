name: Build & Release IPA

on:
  push:
    tags:
      - 'v*'          # spustí se při tagu v1.0.0, v1.0.1 atd.
  workflow_dispatch:  # nebo ručně jedním kliknutím

permissions:
  contents: write

jobs:
  build-ipa:
    name: Build unsigned IPA for AltStore
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || sudo xcode-select -s $(ls /Applications/ | grep Xcode | head -1 | xargs -I{} echo "/Applications/{}/Contents/Developer")

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create Config.plist
        run: cp MHDPruvodce/Config/Config.example.plist MHDPruvodce/Config/Config.plist

      - name: Get version from tag or default
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Archive for iOS device (unsigned)
        run: |
          xcodebuild archive \
            -project MHDPruvodce.xcodeproj \
            -scheme MHDPruvodce \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/MHDPruvodce.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            2>&1 | tee archive.log
          if grep -q "ARCHIVE SUCCEEDED" archive.log; then
            echo "✅ ARCHIVE SUCCEEDED"
          else
            echo "❌ ARCHIVE FAILED"
            grep " error:" archive.log | head -30
            exit 1
          fi

      - name: Package unsigned .ipa manually
        run: |
          ARCHIVE="$RUNNER_TEMP/MHDPruvodce.xcarchive"
          APP_PATH=$(find "$ARCHIVE" -name "*.app" -maxdepth 4 | head -1)
          echo "App path: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/MHDPruvodce.app
          zip -r MHDPruvodce.ipa Payload
          rm -rf Payload

          IPA_SIZE=$(wc -c < MHDPruvodce.ipa)
          echo "IPA size: $IPA_SIZE bytes"
          echo "ipa_size=$IPA_SIZE" >> "$GITHUB_ENV"

          ls -lh MHDPruvodce.ipa

      - name: Get release notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          ## MHD Průvodce ${{ steps.version.outputs.version }}

          ### Instalace přes AltStore (zdarma)
          1. Nainstaluj [AltStore](https://altstore.io) na svůj iPhone
          2. Stáhni `MHDPruvodce.ipa` níže
          3. Otevři soubor v AltStore → Install

          Nebo přidej náš zdroj do AltStore:
          ```
          https://petrchalupny81-ux.github.io/mhd-pruvodce/apps.json
          ```

          ### Co je nového
          - Kompletní iOS app pro sledování MHD v ČR
          - GPS upozornění před zastávkou
          - Podpora všech typů dopravy (bus, tram, metro, vlak, trolejbus)
          - Real-time data z IDOS
          EOF

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHDPruvodce-${{ steps.version.outputs.version }}-unsigned
          path: MHDPruvodce.ipa
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: MHD Průvodce ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: MHDPruvodce.ipa
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AltStore source JSON
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          IPA_URL="https://github.com/petrchalupny81-ux/mhd-pruvodce/releases/latest/download/MHDPruvodce.ipa"

          cat > docs/apps.json << EOF
          {
            "name": "MHD Průvodce Source",
            "identifier": "cz.mhd.pruvodce.altstore",
            "sourceURL": "https://petrchalupny81-ux.github.io/mhd-pruvodce/apps.json",
            "apps": [
              {
                "name": "MHD Průvodce",
                "bundleIdentifier": "cz.mhd.pruvodce",
                "developerName": "MHD Průvodce",
                "subtitle": "Nikdy nezmeškej svoji zastávku",
                "localizedDescription": "Sleduj spoje MHD v reálném čase po celé České republice. GPS upozornění tě varuje před příjezdem na zastávku — funguje i se zavřenou aplikací.\n\nFunkce:\n• Upozornění 10, 5, 3 nebo 2 min před zastávkou\n• Zvuk pouze při připojených sluchátkách\n• Real-time data z IDOS\n• Dynamic Island countdown\n• Podpora bus, tram, metro, vlak, trolejbus",
                "iconURL": "https://raw.githubusercontent.com/petrchalupny81-ux/mhd-pruvodce/main/docs/icon.png",
                "tintColor": "0A84FF",
                "category": "utilities",
                "versions": [
                  {
                    "version": "$VERSION",
                    "date": "$DATE",
                    "localizedDescription": "První verze MHD Průvodce.",
                    "downloadURL": "$IPA_URL",
                    "size": $ipa_size,
                    "minOSVersion": "17.0"
                  }
                ],
                "screenshotURLs": []
              }
            ],
            "news": []
          }
          EOF

          echo "apps.json updated for version $VERSION"

      - name: Commit updated apps.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/apps.json
          git diff --staged --quiet || git commit -m "chore: update AltStore source for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
