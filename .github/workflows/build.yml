name: Build MHD Průvodce

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show versions
        run: xcodebuild -version && swift --version

      - name: Create Config.plist
        run: |
          if [ -n "${{ secrets.CHAPS_API_KEY }}" ]; then
            /usr/libexec/PlistBuddy -c "Add :CHAPS_API_KEY string ${{ secrets.CHAPS_API_KEY }}" MHDPruvodce/Config/Config.plist 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CHAPS_BASE_URL string https://api.idos.cz/api/v1" MHDPruvodce/Config/Config.plist 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CHAPS_APP_ID string ${{ secrets.CHAPS_APP_ID }}" MHDPruvodce/Config/Config.plist 2>/dev/null || true
          else
            cp MHDPruvodce/Config/Config.example.plist MHDPruvodce/Config/Config.plist
            echo "Using mock Config.plist (no API key)"
          fi

      - name: List project structure
        run: xcodebuild -list -project MHDPruvodce.xcodeproj

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project MHDPruvodce.xcodeproj \
            -scheme MHDPruvodce \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee build.log
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ BUILD SUCCEEDED"
          else
            echo "❌ BUILD FAILED"
            grep "error:" build.log | head -30
            exit 1
          fi

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project MHDPruvodce.xcodeproj \
            -scheme MHDPruvodce \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tail -20 || true

      - name: Package .app bundle
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "MHDPruvodce.app" \
                -path "*/Debug-iphonesimulator/*" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            mkdir -p Artifacts
            ditto -c -k --sequesterRsrc --keepParent "$APP" Artifacts/MHDPruvodce-simulator.zip
            echo "✅ Packaged: $APP"
            ls -lh Artifacts/
          else
            echo "⚠️ .app not found in DerivedData"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHDPruvodce-simulator-build
          path: Artifacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
