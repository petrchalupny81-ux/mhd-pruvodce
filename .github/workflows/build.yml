name: Build MHD Průvodce

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # ruční spuštění z GitHub UI jedním kliknutím

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15     # Xcode 16, iOS 18 SDK
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Create Config.plist from secret (or example)
        run: |
          if [ -n "${{ secrets.CHAPS_API_KEY }}" ]; then
            cat > MHDPruvodce/Config/Config.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CHAPS_API_KEY</key>
              <string>${{ secrets.CHAPS_API_KEY }}</string>
              <key>CHAPS_BASE_URL</key>
              <string>https://api.idos.cz/api/v1</string>
              <key>CHAPS_APP_ID</key>
              <string>${{ secrets.CHAPS_APP_ID }}</string>
          </dict>
          </plist>
          EOF
          else
            cp MHDPruvodce/Config/Config.example.plist MHDPruvodce/Config/Config.plist
            echo "ℹ️  Používám mock Config.plist (bez API klíče)"
          fi

      - name: Build for simulator (no signing needed)
        run: |
          xcodebuild build \
            -project MHDPruvodce.xcodeproj \
            -scheme MHDPruvodce \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty --color || xcodebuild build \
              -project MHDPruvodce.xcodeproj \
              -scheme MHDPruvodce \
              -configuration Debug \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project MHDPruvodce.xcodeproj \
            -scheme MHDPruvodce \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty --color || true

      - name: Find and zip .app bundle
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MHDPruvodce.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Artifacts
            zip -r Artifacts/MHDPruvodce-simulator.zip "$APP_PATH"
            echo "✅  App bundle: $APP_PATH"
          else
            echo "⚠️  App bundle nenalezen v DerivedData"
          fi

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: MHDPruvodce-simulator-build
          path: Artifacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Build summary
        run: |
          echo "### ✅ Build dokončen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Scheme:** MHDPruvodce" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination:** iOS Simulator (iPhone 16)" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** MHDPruvodce-simulator-build (ke stažení v záložce Artifacts)" >> $GITHUB_STEP_SUMMARY
