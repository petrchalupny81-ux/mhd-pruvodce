name: MHDPruvodce
options:
  bundleIdPrefix: cz.mhd
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1

targets:
  MHDPruvodce:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: cz.mhd.pruvodce
    info:
      path: MHDPruvodce/Info.plist
      properties:
        CFBundleDisplayName: MHD Průvodce
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationAlwaysAndWhenInUseUsageDescription: "MHD Průvodce potřebuje vaši polohu na pozadí, aby vás upozornil před příjezdem na zastávku."
        NSLocationWhenInUseUsageDescription: "MHD Průvodce potřebuje vaši polohu pro sledování trasy."
        NSLocationAlwaysUsageDescription: "Povolte polohu vždy, aby upozornění fungovala i se zavřenou aplikací."
        UIBackgroundModes:
          - location
          - fetch
          - processing
          - audio
        BGTaskSchedulerPermittedIdentifiers:
          - cz.mhd.refresh
          - cz.mhd.locationcheck
        CFBundleDevelopmentRegion: cs
        CFBundleLocalizations:
          - cs
    entitlements:
      path: MHDPruvodce/MHDPruvodce.entitlements
      properties:
        com.apple.developer.location.push: true
        com.apple.security.application-groups:
          - group.cz.mhd.pruvodce
    sources:
      - path: MHDPruvodce/App
      - path: MHDPruvodce/Config
        excludes:
          - Config.plist           # gitignored — kopíruj z Config.example.plist
      - path: MHDPruvodce/Config/Config.plist
        optional: true
      - path: MHDPruvodce/Models
      - path: MHDPruvodce/Networking
      - path: MHDPruvodce/Managers
      - path: MHDPruvodce/ViewModels
      - path: MHDPruvodce/Views
      - path: MHDPruvodce/LiveActivity
      - path: MHDPruvodce/Extensions
      - path: MHDPruvodce/Resources
      - path: MHDPruvodce/Preview Content
    resources:
      - path: MHDPruvodce/Resources/Assets.xcassets
      - path: MHDPruvodce/Resources/cs.lproj
      - path: MHDPruvodce/Resources/alert_far.caf
        optional: true
      - path: MHDPruvodce/Resources/alert_near.caf
        optional: true
      - path: MHDPruvodce/Resources/alert_arrive.caf
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.mhd.pruvodce
        DEVELOPMENT_TEAM: ""       # vyplň svůj Team ID
        INFOPLIST_FILE: MHDPruvodce/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AppPrimary

  MHDPruvodceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: cz.mhd.pruvodce.tests
    sources:
      - path: MHDPruvodceTests
    dependencies:
      - target: MHDPruvodce
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.mhd.pruvodce.tests
        SWIFT_VERSION: 5.9
